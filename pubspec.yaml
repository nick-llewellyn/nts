name: nts
description: >-
  Authenticated network time for Flutter apps, secured by Network
  Time Security (NTS).
version: 5.0.0
homepage: https://github.com/nick-llewellyn/nts
repository: https://github.com/nick-llewellyn/nts
issue_tracker: https://github.com/nick-llewellyn/nts/issues

topics:
  - ntp
  - time
  - networking
  - security
  - cryptography

screenshots:
  - description: >-
      Client tab: NTS server catalog with region filtering, favourites,
      and live authenticated time query results.
    path: screenshots/screenshot_client.webp
  - description: >-
      Log tab: unified live log of authenticated time queries and
      NTS-KE exchange details.
    path: screenshots/screenshot_log.webp

# Explicit platform allow-list. RFC 8915 requires raw TCP (NTS-KE on
# :4460) and raw UDP (NTPv4 on :123) sockets, neither of which is
# reachable from a browser tab, and the underlying rustls + ring stack
# has no wasm32-unknown-unknown build target. `web` and `wasm` are
# therefore omitted so the declared platform set matches what the
# package can actually run on.
platforms:
  android:
  ios:
  macos:
  linux:
  windows:

environment:
  # Lower bound matches the `hooks` package floor (Dart >=3.10.0), which
  # corresponds to Flutter 3.38.0 stable (Nov 2025) -- the first release to
  # ship Dart 3.10. CI exercises both this floor and the latest `stable`
  # channel (matches `.fvmrc`) to keep Native Assets + FRB bindings
  # drift-free.
  sdk: '^3.10.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  # Pinned exactly: the Rust-side `flutter_rust_bridge` crate and this Dart
  # package share a wire format that is not guaranteed stable across minor
  # versions. A mismatch between the codegen used to emit `lib/src/ffi/` and
  # the runtime crate produces silent memory corruption rather than a clear
  # error, so both sides must move in lockstep. Bumping this requires a
  # coordinated update of `rust/Cargo.toml` and a regeneration of the
  # bindings via `flutter_rust_bridge_codegen generate`, gated by
  # `tool/check_bindings.dart` in CI.
  #
  # `dart pub publish` will warn that this constraint should allow more
  # than one version. That warning is accepted: silent memory corruption
  # on a wire-format mismatch is a worse failure mode than refusing to
  # pick up a newer FRB. Do not relax to `^2.12.0` without first
  # verifying that the FRB project has stabilised its wire format across
  # minors.
  flutter_rust_bridge: 2.12.0
  # Required by FRB-generated `nts.freezed.dart` for the sealed `NtsError`
  # variant types. Runtime annotations only; the generator itself is in
  # `dev_dependencies`.
  freezed_annotation: ^3.1.0
  # Build-hook dependencies (consumed only by `hook/build.dart`). The Dart
  # SDK resolves these out-of-band when running the Native Assets pipeline,
  # so they don't pull native_toolchain_rust into the app's runtime graph.
  hooks: ^1.0.3
  native_toolchain_rust: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Used internally by `flutter_rust_bridge_codegen generate` to emit the
  # `dart:ffi` bindings. Not a runtime dependency.
  ffigen: ^20.1.1
  # Code generator backing `@freezed`. FRB v2 invokes it transparently when
  # bridging Rust enums-with-data to Dart sealed classes.
  freezed: ^3.2.5
  # Required by `freezed`'s build pipeline.
  build_runner: ^2.14.1

# Flutter plugin classification. Declared here so consuming Flutter apps
# pick up the Android library module shipped under `android/`, which
# bundles:
#
#   * `com.nllewellyn.nts.NtsPlugin` -- a `FlutterPlugin` that
#     auto-initialises `rustls-platform-verifier` against the Android system
#     trust store from `onAttachedToEngine`. Consumers do nothing beyond
#     adding `nts` to their `pubspec.yaml`; `GeneratedPluginRegistrant`
#     wires the call up before `main()` runs.
#   * `com.nllewellyn.nts.PlatformInit` -- the matched JNI Kotlin class for
#     the symbol exported from `rust/src/android_init.rs`. Also exposes a
#     public `static init(Context)` for hosts that bypass the standard
#     `FlutterActivity` lifecycle (e.g. add-to-app embeddings).
#   * `consumer-rules.pro` -- ProGuard / R8 keep rules covering both the
#     companion AAR (`org.rustls.platformverifier.**`) and our own JNI
#     class. Auto-merged into the host app's shrinker config.
#   * `build.gradle.kts` -- discovers the on-disk Maven repo bundled inside
#     the `rustls-platform-verifier-android` cargo crate via `cargo
#     metadata`, so the AAR resolves regardless of where the plugin lives
#     on disk (source tree, pub cache, monorepo, etc.).
#
# Native code (the FRB-generated dylib `libnts_rust.so`) continues to be
# delivered via the Native Assets pipeline (`hook/build.dart`); the plugin
# module ships no `jniLibs/` and does no Cargo wiring of its own.
#
# Platforms other than Android remain pure Native-Assets packages with no
# accompanying plugin module. iOS/macOS/Linux/Windows do not require
# JVM-style runtime bootstrap; iOS observability is wired by
# `rust/src/ios_init.rs` directly from `api::simple::init_app`.
flutter:
  plugin:
    platforms:
      android:
        package: com.nllewellyn.nts
        pluginClass: NtsPlugin
