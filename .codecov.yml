# Codecov configuration for nts.
#
# Validate locally before merging:
#   curl --data-binary @.codecov.yml https://codecov.io/validate
#
# Carryforward flags let a commit inherit the parent's coverage report
# per flag when no upload is produced for that flag on the new commit.
# Without this, a doc-only commit (or any commit where the gating
# `if:` in ci.yml skips the matching matrix leg) lands on `main` with
# no Codecov sessions and the dashboard reports "tracked lines
# deactivated" until the next code-touching merge restores HEAD
# coverage. With carryforward, the dart and rust flags inherit the
# previous commit's sessions so HEAD always has data.
#
# `paths` is required for carryforward to disambiguate which files
# belong to each flag; otherwise Codecov treats the flag as covering
# the whole repo and merge logic gets surprising.

codecov:
  require_ci_to_pass: true
  notify:
    # Wait for all CI jobs to finish before posting the status. Avoids
    # transient "missing dart flag" status flips when the rust job
    # finishes first.
    wait_for_ci: true

flags:
  dart:
    paths:
      - lib/
    carryforward: true
  rust:
    paths:
      - rust/src/
    carryforward: true

# Files ignored entirely by Codecov: removed from the merged report,
# the per-flag totals, and PR diff annotations. Glob syntax matches
# the repo root.
#
# Two categories are excluded:
#
#   1. flutter_rust_bridge codegen output. `flutter_rust_bridge_codegen
#      generate` regenerates these files verbatim from the Rust
#      surface and they are checked in only so consumers do not need
#      the codegen toolchain. Mock-mode unit tests
#      (`RustLib.initMock`) deliberately bypass the dispatch layer,
#      and the Rust-side `frb_generated.rs` is reachable only from
#      the dynamic library entry point that is never linked during
#      `cargo test --lib`. Counting them in the denominator drives
#      the dart flag to ~7% even when every hand-written line is
#      covered (see `test/api_smoke_test.dart`, 100%).
#   2. Platform / lifecycle init code. `android_init.rs`,
#      `ios_init.rs`, and `api/simple.rs` (which now holds only the
#      `#[frb(init)]` lifecycle hook) only run inside the host process
#      when the crate is loaded via `System.loadLibrary` / `dlopen`
#      on the respective device — none of those paths exist on the
#      `ubuntu-latest` runner that produces the rust flag.
#
# See `DEVELOPMENT.md` → "Coverage exclusion policy" for the decision
# tree governing additions to this list. Rust entries here must mirror
# the `exclude_files` list in `rust/tarpaulin.toml` and the
# `--exclude-files` flags in `.github/workflows/ci.yml` so local and
# CI artefacts agree on the denominator.
ignore:
  # FRB-generated Dart bindings (regenerated by `dart run
  # flutter_rust_bridge_codegen generate`). `nts.freezed.dart` is
  # filtered upstream by its inline `// coverage:ignore-file`
  # directive emitted by the freezed generator, so it does not
  # appear here.
  - "lib/src/ffi/frb_generated.dart"
  - "lib/src/ffi/frb_generated.io.dart"
  - "lib/src/ffi/frb_generated.web.dart"
  - "lib/src/ffi/api/nts.dart"
  # FRB-generated Rust dispatch table (regenerated alongside the
  # Dart bindings above; kept in sync by the rust-bridge-sync CI
  # job).
  - "rust/src/frb_generated.rs"
  # Platform init shims that the Linux tarpaulin runner cannot
  # exercise. Reintroduce per-target coverage jobs before removing
  # these from the ignore list.
  - "rust/src/android_init.rs"
  - "rust/src/ios_init.rs"
  # FRB lifecycle hook (`#[frb(init)]`). Fires when the dylib is
  # loaded, which `cargo test --lib` does not do; same justification
  # as the `*_init.rs` shims above.
  - "rust/src/api/simple.rs"

# Coverage status checks (NTS-73). Explicit targets replace the
# Codecov "auto" default so the pass/fail line is a deliberate policy
# rather than whatever the base commit happened to report.
#
# Calibration (from the Codecov API at the time of writing):
#   overall 88.92% - merged dart+rust report
#   dart    95.43% - flag baseline
#   rust    87.30% - flag baseline
# Project targets sit ~1pt under each baseline so routine refactors
# do not trip the check, and `threshold` allows a further 1% drop
# relative to the base commit before the status goes red.
#
# All statuses are `informational: true` for now: they report to
# GitHub but never block a PR. Flip to blocking (delete the key)
# deliberately once they have demonstrated stability across a few
# merges -- same promote-when-proven convention as the advisory CI
# jobs (see DEVELOPMENT.md branch-protection table).
#
# Carryforward interaction: the dart/rust flags carry forward, so a
# PR that skips one matrix leg (e.g. a Rust-only change skips the
# dart upload) still has flag data for the status to evaluate.
# `flag_coverage_not_uploaded_behavior: include` makes that explicit:
# carried-forward sessions count toward the flag statuses instead of
# the status silently passing with no data.
coverage:
  status:
    project:
      default:
        # Merged dart+rust report; floor ~1pt under the 88.92% baseline.
        target: 88%
        threshold: 1%
        informational: true
      dart:
        flags:
          - dart
        target: 94%
        threshold: 1%
        informational: true
        flag_coverage_not_uploaded_behavior: include
      rust:
        flags:
          - rust
        target: 86%
        threshold: 1%
        informational: true
        flag_coverage_not_uploaded_behavior: include
    patch:
      default:
        # Coverage of lines changed in the PR diff. Lower than the
        # project floors: small diffs quantise harshly (one uncovered
        # line in a five-line diff is 80%), and the ignore list above
        # already removes the untestable generated/platform files
        # from the diff denominator.
        target: 75%
        threshold: 5%
        informational: true
