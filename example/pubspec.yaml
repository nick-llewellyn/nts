name: nts_example
description: |
  Showcase app for the `nts` (RFC 8915) Flutter package. Drives nts_query
  and nts_warm_cookies against a searchable catalog of public NTS-KE
  servers loaded from assets/nts-sources.yml and streams the resulting
  NtsTimeSample / NtsError into a shareable on-screen log.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.5'
  flutter: '^3.41.7'

dependencies:
  flutter:
    sdk: flutter
  nts:
    path: ../
  # Pinned to the same major as the parent package; used here only so
  # the example can call RustLib.initMock with a hand-rolled fake api
  # when the native dylib has not been bundled yet (trusted_time-eg9).
  flutter_rust_bridge: 2.12.0
  cupertino_icons: ^1.0.8
  signals: ^6.3.0
  yaml: ^3.1.3
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  args: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # Bundled at build time and read at app startup by `ServerLoader`
  # (lib/src/data/server_loader.dart). The file is a verbatim copy of
  # the public NTS-KE server list curated at
  # https://gist.github.com/mutin-sa/eea1c396b1e610a2da1e5550d94b0453,
  # republished as YAML so the example can ship a meaningful catalog
  # without hard-coding entries into Dart source. Refresh by replacing
  # the file in-tree; no codegen step is involved.
  assets:
    - assets/nts-sources.yml

# Launcher-icon generation (`fvm flutter pub run flutter_launcher_icons`).
#
# Source assets live under `assets/icon/`:
#   * `source.svg`           -- canonical hand-authored vector
#   * `icon.png`             -- 1024x1024 full-bleed master (iOS,
#                               macOS, Windows, web fall back here)
#   * `icon_foreground.png`  -- 1024x1024 transparent foreground for
#                               Android adaptive icons (logo inset
#                               into the safe zone)
#   * `icon_background.png`  -- 1024x1024 solid brand-primary plate
#                               (matches `appBarTheme` + M3 seed in
#                                lib/main.dart)
#
# Regenerate the PNGs from the SVG with `tool/generate_icon.py`.
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: "ic_launcher"
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

# Native Assets build-hook configuration.
#
# `nts/hook/build.dart` reads `verbose_logs` and toggles
# `RustBuilder.buildMode` (release ↔ debug) and the crate's
# `log-strip` Cargo feature accordingly. Production-safe default is
# `false`: shipping builds get the stripped release binary
# (`release_max_level_warn` compiled in, info/debug/trace call sites
# elided).
#
# To enable verbose Rust traces locally — including `rustls` protocol
# events under iOS Console.app subsystem `com.nts.example` and
# Android `logcat` — flip the value below to `true` and run
# `flutter clean` before the next build so Native Assets re-runs the
# hook against the new user-define. Restore to `false` before
# committing or shipping.
hooks:
  user_defines:
    nts:
      verbose_logs: false
