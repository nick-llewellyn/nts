name: Scorecard

# Runs OpenSSF Scorecard on every push to main and on a weekly schedule.
# `publish_results` is true only when running from the default branch (main),
# which is the only context the Scorecard API accepts for badge publication.
# workflow_dispatch is included so the analysis can be triggered manually on
# any branch for debugging; results are only published when ref is main.

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday at 04:00 UTC (offset from the Sunday cron in
    # codeql.yml to spread load across runners).
    - cron: '0 4 * * 1'
  workflow_dispatch:

# Top-level permissions are read-only. The Scorecard API's workflow
# verification rejects the badge publish with HTTP 400 if `id-token: write`
# is granted at the workflow (global) level, so the write scopes are declared
# at the job level instead, per the canonical ossf/scorecard-action template.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scorecard:
    name: OpenSSF Scorecard analysis
    runs-on: ubuntu-latest
    # `id-token: write` mints the OIDC JWT scorecard-action uses to
    # authenticate the result publish; `security-events: write` uploads the
    # SARIF to the Security tab; `contents: read` is for checkout.
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: ${{ github.ref == 'refs/heads/main' }}

      - name: Upload SARIF results to Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: scorecard-results.sarif
