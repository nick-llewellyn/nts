name: Scorecard

# Runs OpenSSF Scorecard on every push to main and on a weekly schedule.
# `publish_results: true` uploads results to api.scorecard.dev, which is
# what populates the badge in README.md and the Security tab overview.
# The action must run from the default branch (main) to publish results;
# PR runs are informational only (no publish).

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Monday at 04:00 UTC (offset from the Sunday cron in
    # codeql.yml to spread load across runners).
    - cron: '0 4 * * 1'
  workflow_dispatch:

# `contents: read` for checkout; `id-token: write` to mint the OIDC JWT
# that scorecard-action uses to authenticate the result publish;
# `security-events: write` to upload the SARIF to the Security tab.
permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scorecard:
    name: OpenSSF Scorecard analysis
    runs-on: ubuntu-latest
    # publish_results only works from the default branch; guard so a
    # workflow_dispatch from a feature branch doesn't fail the publish step.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
