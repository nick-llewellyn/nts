name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.beads/**'
      - 'screenshots/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.beads/**'
      - 'screenshots/**'
  workflow_dispatch:

jobs:
  changes:
    # Cheap path-filter pass that classifies the diff and gates the heavy
    # Rust jobs below. paths-ignore (above) already drops doc / metadata
    # commits at the trigger level; this job adds finer per-area gating
    # so e.g. a Dart-only edit doesn't pay for cargo build + frb codegen.
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      bindings: ${{ steps.filter.outputs.bindings }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'rust/**'
              - 'hook/**'
              - 'flutter_rust_bridge.yaml'
              - 'pubspec.yaml'
            bindings:
              - 'lib/src/ffi/**'
              - 'tool/check_bindings.dart'
            ci:
              - '.github/workflows/**'

  build:
    # Matrix exercises both the declared SDK floor (3.38.10 -- oldest stable
    # satisfying `flutter: ^3.38.0` in pubspec.yaml, ships Dart 3.10.9) and
    # the pinned current version (3.41.7, matches .fvmrc). Format check runs
    # only on the pinned version because `dart format` output can shift
    # between Dart minors and we don't want spurious failures on the floor.
    #
    # Always runs (no `if:` gate): the Dart pipeline is cheap and provides
    # the foundational format / analyze / test feedback on every change
    # that survives paths-ignore.
    name: Format / analyze / Dart tests (Flutter ${{ matrix.flutter }})
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.38.10', '3.41.7']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Verify formatting
        if: matrix.flutter == '3.41.7'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze package
        run: dart analyze .

      - name: Run Dart tests (mock-mode FRB smoke)
        run: flutter test

      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example app
        working-directory: example
        run: flutter analyze

  rust:
    name: Rust build + tests
    runs-on: ubuntu-latest
    needs: changes
    # Skip when the diff doesn't touch Rust sources, the build hook, the
    # FRB config, the pubspec (FRB pin lives there), or the workflow file
    # itself. workflow_dispatch always runs everything.
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + crate target
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust

      - name: Build Rust crate (--locked)
        working-directory: rust
        run: cargo build --locked

      - name: Run Rust unit tests
        working-directory: rust
        run: cargo test --lib --locked

  rust-bridge-sync:
    name: Verify FRB bindings are in sync
    runs-on: ubuntu-latest
    needs: changes
    # Drift check only matters when Rust source, the generated bindings,
    # or the workflow itself moved. Bindings-only edits (someone hand-
    # editing lib/src/ffi/) still trigger this so the regenerator catches
    # the drift.
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.bindings == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + crate target
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust

      - name: Cache flutter_rust_bridge_codegen binary
        id: frb-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/flutter_rust_bridge_codegen
          key: frb-codegen-2.12.0-${{ runner.os }}

      - name: Install flutter_rust_bridge_codegen (=2.12.0)
        if: steps.frb-cache.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen --version "=2.12.0" --locked

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Install FVM and link Flutter SDK
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          # Reuse the SDK already installed by subosito/flutter-action so FVM
          # does not re-download Flutter 3.41.7 (~1.4 GB) into its own cache.
          mkdir -p "$HOME/fvm/versions"
          ln -sfn "$FLUTTER_ROOT" "$HOME/fvm/versions/3.41.7"

      - name: Verify FVM resolves to the linked SDK
        run: fvm flutter --version

      - name: Regenerate bindings + assert no drift
        # Single source of truth for drift detection; the same script runs
        # locally via `dart run tool/check_bindings.dart`.
        run: dart run tool/check_bindings.dart
