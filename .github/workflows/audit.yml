name: Cargo Audit

on:
  push:
    branches: [main]
    paths:
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/audit.yml'
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit Rust dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # cargo audit's exit code from the JSON-generation step, surfaced
      # cross-job so post-audit can branch on it. Contract (nts-0rn):
      #   0 -> clean
      #   1 -> advisories found (JSON on stdout is still complete and
      #        the existing table-render path can consume it)
      #   *  -> environmental failure (network, advisory DB schema
      #        mismatch, ...); JSON is usually empty/partial and the
      #        captured stderr in audit.err carries the real diagnostic
      audit_exit: ${{ steps.gen_audit_json.outputs.audit_exit }}
      # Direct download URL for the uploaded audit-results artifact,
      # surfaced in the sticky PR comment so reviewers don't have to
      # scroll to the run's Artifacts tray (nts-ca4). Empty when the
      # upload step was skipped (non-PR / fork-PR).
      artifact_url: ${{ steps.upload_audit_json.outputs.artifact-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Audit Rust dependencies
        id: run_audit
        uses: actions-rust-lang/audit@72c09e02f132669d52284a3323acdb503cfc1a24 # v1
        with:
          workingDirectory: rust

      - name: Generate Audit JSON
        id: gen_audit_json
        # Run even if the audit action failed (vulnerabilities found).
        # Skip if the job was cancelled or if not on a PR from same repo.
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.run_audit.outcome != 'cancelled'
        # nts-0rn: capture stderr to a sibling file and surface the
        # exact exit code as a step output instead of swallowing every
        # non-zero with `|| true`. The previous redirection
        # `cargo audit --json >audit.json || true` collapsed all three
        # states (clean / advisories-found / env-failure) into
        # "succeeded" and discarded stderr, so a real CI breakage
        # (DB pull failure, network outage) showed up as the
        # uninformative "could not parse" branch in the sticky
        # comment.
        #
        # We deliberately never fail this step itself: the
        # artifact-upload and post-audit comment steps both need to
        # run on every outcome so reviewers can see *why* the audit
        # failed. The dedicated `Check audit exit code` step at the
        # end of this job promotes "other non-zero" to a hard job
        # failure once the artifacts are safely uploaded.
        #
        # Reproducing the three states locally for verification:
        #   clean:           (cd rust && cargo audit --json)
        #   advisories:      install a known-vuln crate, rerun
        #   env-failure:     (cd rust && CARGO_NET_OFFLINE=1 \
        #                       cargo audit --json --no-fetch); or
        #                    `cargo audit --db /tmp/does-not-exist`
        run: |
          set +e
          cargo audit --json >audit.json 2>audit.err
          audit_exit=$?
          set -e
          printf '%s\n' "$audit_exit" >audit-exit
          echo "audit_exit=$audit_exit" >>"$GITHUB_OUTPUT"
          case "$audit_exit" in
            0)  echo "cargo audit: clean (exit 0)";;
            1)  echo "cargo audit: advisories found (exit 1) -- continuing so the sticky PR comment can render";;
            *)  echo "cargo audit: environmental failure (exit $audit_exit); stderr follows"
                cat audit.err >&2;;
          esac
        working-directory: rust

      - name: Upload Audit JSON
        id: upload_audit_json
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.run_audit.outcome != 'cancelled'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: audit-results
          # Include audit.err and audit-exit alongside audit.json so
          # the post-audit job can render the environmental-failure
          # path (nts-0rn) and so reviewers downloading the artifact
          # get the full diagnostic context, not just the (possibly
          # empty) JSON. upload-artifact@v4 strips the common parent
          # directory, so all three land at the artifact root.
          path: |
            rust/audit.json
            rust/audit.err
            rust/audit-exit
          retention-days: 1

      - name: Check audit exit code
        # nts-0rn: promote environmental failures (exit codes other
        # than 0 or 1) to a hard job failure. Runs only after the
        # artifact upload so post-audit still has the data it needs
        # to render an informative sticky comment. Exit 1 ("advisories
        # found") is already gated by the upstream
        # actions-rust-lang/audit@v1 step; this guard is purely about
        # exit codes that indicate the audit *itself* could not run.
        #
        # PR-only: gen_audit_json is gated to same-repo pull_request
        # events, so on push/schedule/workflow_dispatch it is skipped
        # and so is this step. Environmental failures on those event
        # types are caught by the upstream run_audit step (no `if:`
        # guard) which will still fail the job.
        if: always() && steps.gen_audit_json.outcome == 'success'
        run: |
          audit_exit='${{ steps.gen_audit_json.outputs.audit_exit }}'
          case "$audit_exit" in
            0|1) echo "cargo audit exit code $audit_exit is the expected success/advisories-found path";;
            *)   echo "::error::cargo audit failed with exit code $audit_exit (environmental failure); see audit.err in the audit-results artifact"
                 exit 1;;
          esac

  post-audit:
    name: Post Audit Comment
    runs-on: ubuntu-latest
    needs: audit
    # Only run on same-repo PRs. always() ensures it runs even if audit failed.
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.audit.result != 'cancelled'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download Audit JSON
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: audit-results
          path: .

      - name: Generate Summary
        env:
          # Pulled across the audit -> post-audit job boundary so the
          # renderer can distinguish "clean / advisories-found /
          # env-failure" (nts-0rn) and link to the uploaded artifact
          # (nts-ca4) without recomputing them.
          AUDIT_EXIT: ${{ needs.audit.outputs.audit_exit }}
          ARTIFACT_URL: ${{ needs.audit.outputs.artifact_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # nts-0rn + nts-ca4: render the sticky PR comment so it
          # (a) distinguishes "no advisories" / "advisories found" /
          # "audit itself failed" instead of collapsing all three into
          # the previous "could not parse" branch, and (b) caps the
          # inline JSON at 32 KB to stay under GitHub's ~65 KB comment
          # limit. The full JSON + captured stderr are always
          # available as a workflow artifact -- the comment links to
          # it explicitly so reviewers don't have to guess where the
          # full report lives.
          INLINE_JSON_CAP=32768
          INLINE_STDERR_CAP=8192
          COMMENT_SIZE_LIMIT=61440
          {
            echo "### 🦀 Cargo Audit Report"
            echo ""
          } > audit-summary.md

          # Authoritative source for the exit code is the audit job's
          # cross-job output (AUDIT_EXIT env var set below). The
          # audit-exit file shipped in the artifact is belt-and-braces:
          # it is the canonical value for direct human inspection of the
          # downloaded artifact, not a required code path here (the
          # download-artifact step would fail before this script runs if
          # the artifact were missing).
          audit_exit="${AUDIT_EXIT:-}"
          if [ -z "$audit_exit" ] && [ -f audit-exit ]; then
            audit_exit="$(tr -d '[:space:]' <audit-exit)"
          fi

          # JSON-path is only viable when cargo audit completed with
          # the documented success/advisories-found exit codes *and*
          # the JSON on stdout parses. Anything else routes through
          # the stderr-bearing error branch below.
          json_path_ok=false
          case "$audit_exit" in
            0|1) if jq empty audit.json 2>/dev/null; then json_path_ok=true; fi;;
          esac

          if [ "$json_path_ok" = "true" ]; then
            VULN_COUNT=$(jq '.vulnerabilities.count' audit.json)
            if [ "$VULN_COUNT" -eq "0" ]; then
              echo "✅ No vulnerabilities found." >> audit-summary.md
            else
              {
                echo "⚠️ Found $VULN_COUNT vulnerability/vulnerabilities."
                echo ""
                echo "| Package | Version | Advisory | Title |"
                echo "| --- | --- | --- | --- |"
              } >> audit-summary.md
              # mdcell: sanitise upstream RustSec advisory fields before
              # interpolating them into a GitHub-flavoured markdown table.
              # Without this, a stray `|` in an advisory title would split
              # the cell and a `\n` would terminate the row; in the worst
              # case a crafted advisory record could inject confusing
              # formatting into the reviewer-facing comment. We escape
              # `|` -> `\|` (the table-cell escape) and collapse
              # CR/LF/Tab to a single space so each advisory stays on one
              # row. Applied to every field that originates from
              # `cargo audit --json`, including the URL: the issue is
              # table-layout safety, not URL validation (out of scope per
              # nts-mat).
              #
              # Worked example: an advisory with name="evil|pkg" and
              # title="Foo | bar\n[click me](...)" renders as
              #   | evil\|pkg | ... | Foo \| bar [click me](...) |
              # in a single row, instead of splitting across cells and
              # rows as it would unescaped.
              jq -r '
                def mdcell: tostring | gsub("\\|"; "\\|") | gsub("[\r\n\t]+"; " ");
                .vulnerabilities.list[]
                | "| \(.package.name | mdcell) | \(.package.version | mdcell) | [\(.advisory.id | mdcell)](\(.advisory.url | mdcell)) | \(.advisory.title | mdcell) |"
              ' audit.json >> audit-summary.md
            fi

            # nts-ca4: link to the uploaded artifact (the canonical
            # source for the full report) and inline a 32 KB-capped
            # excerpt for quick-glance reading inside the comment. The
            # inline excerpt is byte-truncated at the cap with an
            # explicit marker so reviewers know the comment is not the
            # whole story -- the previous inline-full-JSON layout
            # would silently break the sticky-comment action on a
            # noisy advisory day, exactly when the data is most
            # interesting.
            {
              echo ""
              if [ -n "${ARTIFACT_URL:-}" ]; then
                echo "Full \`cargo audit --json\` output: [\`audit-results\` artifact]($ARTIFACT_URL) (from [this workflow run]($RUN_URL))."
              else
                echo "Full \`cargo audit --json\` output: see the \`audit-results\` artifact on [this workflow run]($RUN_URL)."
              fi
              echo ""
              echo "<details><summary>Inline JSON excerpt (capped at ${INLINE_JSON_CAP} bytes)</summary>"
              echo ""
              echo "\`\`\`json"
            } >> audit-summary.md
            json_size=$(wc -c <audit.json | tr -d '[:space:]')
            if [ "${json_size:-0}" -gt "$INLINE_JSON_CAP" ]; then
              # Close the fence before the truncation marker so the
              # inline excerpt is a self-contained (if incomplete) JSON
              # block. A reviewer who copies it into jq sees a clean
              # parse error at the cut point rather than a C-style
              # comment confusing the parser. Note: head -c truncates at
              # a byte boundary which may land mid-multibyte character;
              # RustSec advisory content is ASCII in practice so this is
              # theoretical, but reviewers should not reuse this pattern
              # on arbitrary user-supplied UTF-8 without a Unicode-aware
              # truncation step.
              head -c "$INLINE_JSON_CAP" audit.json >> audit-summary.md
              {
                echo ""
                echo "\`\`\`"
                echo ""
                echo "_Truncated at ${INLINE_JSON_CAP} of ${json_size} bytes — see the artifact for the full report._"
              } >> audit-summary.md
            else
              cat audit.json >> audit-summary.md
              echo "\`\`\`" >> audit-summary.md
            fi
            echo "</details>" >> audit-summary.md
          else
            # Environmental-failure path (nts-0rn). Surface the
            # captured stderr verbatim instead of the (likely empty or
            # partial) stdout JSON, so reviewers know *why* the audit
            # could not run. The full stderr is always in the
            # artifact; the inline excerpt is capped to keep the
            # comment bounded.
            {
              echo "⚠️ \`cargo audit\` failed (exit code \`${audit_exit:-unknown}\`)."
              echo ""
              echo "The run itself failed for a reason unrelated to vulnerabilities (e.g."
              echo "advisory DB fetch error, network outage). The captured stderr is"
              echo "reproduced below; see the"
              if [ -n "${ARTIFACT_URL:-}" ]; then
                echo "[\`audit-results\` artifact]($ARTIFACT_URL) on [this workflow run]($RUN_URL)"
              else
                echo "\`audit-results\` artifact on [this workflow run]($RUN_URL)"
              fi
              echo "for the full \`audit.json\`, \`audit.err\`, and \`audit-exit\` files."
              echo ""
              echo "<details><summary>Captured stderr (capped at ${INLINE_STDERR_CAP} bytes)</summary>"
              echo ""
              echo "\`\`\`text"
            } >> audit-summary.md
            if [ -s audit.err ]; then
              # audit.err exists and is non-empty.
              err_size=$(wc -c <audit.err | tr -d '[:space:]')
              if [ "${err_size:-0}" -gt "$INLINE_STDERR_CAP" ]; then
                head -c "$INLINE_STDERR_CAP" audit.err >> audit-summary.md
                {
                  echo ""
                  echo "... truncated at ${INLINE_STDERR_CAP} of ${err_size} bytes; see artifact for the full stderr ..."
                } >> audit-summary.md
              else
                cat audit.err >> audit-summary.md
              fi
            else
              # audit.err is absent or zero-length (cargo audit crashed
              # before writing any stderr, or the file was not captured).
              echo "(no stderr captured)" >> audit-summary.md
            fi
            {
              echo "\`\`\`"
              echo "</details>"
            } >> audit-summary.md
          fi

          # nts-ca4: a workflow-side guard against the sticky-comment
          # action failing opaquely on oversize input. GitHub's
          # documented per-comment limit is ~65 KB; we trip at ~60 KB
          # to leave headroom for the action's own framing and any
          # later additions. If this fires, the inline caps above are
          # not aggressive enough and need tightening (or another
          # field has been added that needs its own cap).
          summary_size=$(wc -c <audit-summary.md | tr -d '[:space:]')
          if [ "${summary_size:-0}" -gt "$COMMENT_SIZE_LIMIT" ]; then
            echo "::error::Rendered audit-summary.md is ${summary_size} bytes which exceeds the ${COMMENT_SIZE_LIMIT}-byte safety cap (sticky-comment action would fail or silently truncate). Tighten INLINE_JSON_CAP / INLINE_STDERR_CAP in .github/workflows/audit.yml."
            exit 1
          fi

      - name: Sticky Comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3
        with:
          header: cargo-audit
          path: audit-summary.md
