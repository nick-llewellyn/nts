name: Cargo Audit

on:
  push:
    branches: [main]
    paths:
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/audit.yml'
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit Rust dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Audit Rust dependencies
        uses: actions-rust-lang/audit@v1
        with:
          workingDirectory: rust
