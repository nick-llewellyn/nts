name: Cargo Audit

on:
  push:
    branches: [main]
    paths:
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/Cargo.toml'
      - 'rust/Cargo.lock'
      - '.github/workflows/audit.yml'
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit Rust dependencies
    runs-on: ubuntu-latest
    # pull-requests: write is scoped to this job (not the whole workflow)
    # because only the sticky-comment step needs it; push events and
    # scheduled runs don't post comments at all.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Audit Rust dependencies
        uses: actions-rust-lang/audit@v1
        with:
          workingDirectory: rust

      - name: Post Audit Comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          # The audit action installs cargo-audit, so it's available here.
          # We run it again with --json to capture the full report for the comment.
          # `|| true` prevents bash -e from aborting this step on a non-zero exit
          # (cargo-audit exits 1 when vulnerabilities are found), so the summary
          # is always generated and the sticky comment is always posted.
          cargo audit --json > audit.json || true

          echo "### 🦀 Cargo Audit Report" > audit-summary.md
          echo "" >> audit-summary.md

          # Guard against an empty or malformed audit.json (e.g. advisory DB
          # fetch failure, I/O error).  jq will exit non-zero if the file is
          # not valid JSON, and bash -e would abort the step, preventing the
          # sticky comment from being posted.
          if ! jq empty audit.json 2>/dev/null; then
            echo "⚠️ Could not parse audit output — \`cargo audit\` may have" >> audit-summary.md
            echo "failed for a reason unrelated to vulnerabilities (e.g. advisory" >> audit-summary.md
            echo "DB fetch error). Raw output:" >> audit-summary.md
            echo "" >> audit-summary.md
            echo "<details><summary>Raw output</summary>" >> audit-summary.md
            echo "" >> audit-summary.md
            echo "\`\`\`" >> audit-summary.md
            { cat audit.json 2>/dev/null || echo "(no output)"; } >> audit-summary.md
            echo "\`\`\`" >> audit-summary.md
            echo "</details>" >> audit-summary.md
          else
            VULN_COUNT=$(jq '.vulnerabilities.count' audit.json)
            if [ "$VULN_COUNT" -eq "0" ]; then
              echo "✅ No vulnerabilities found." >> audit-summary.md
            else
              echo "⚠️ Found $VULN_COUNT vulnerability/vulnerabilities." >> audit-summary.md
              echo "" >> audit-summary.md
              echo "| Package | Version | Advisory | Title |" >> audit-summary.md
              echo "| --- | --- | --- | --- |" >> audit-summary.md
              jq -r '.vulnerabilities.list[] | "| \(.package.name) | \(.package.version) | [\(.advisory.id)](\(.advisory.url)) | \(.advisory.title) |"' audit.json >> audit-summary.md
            fi

            echo "" >> audit-summary.md
            echo "<details><summary>Full JSON Output</summary>" >> audit-summary.md
            echo "" >> audit-summary.md
            echo "\`\`\`json" >> audit-summary.md
            cat audit.json >> audit-summary.md
            echo "\`\`\`" >> audit-summary.md
            echo "</details>" >> audit-summary.md
          fi
        working-directory: rust

      - name: Sticky Comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cargo-audit
          path: rust/audit-summary.md
