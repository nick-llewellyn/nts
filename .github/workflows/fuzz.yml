name: Nightly fuzz

# Nightly cargo-fuzz job for the `nts_rust` parser surface.
#
# Separate workflow from `ci.yml` because:
#   - Trigger shape differs: this runs on cron + manual dispatch,
#     not on every push/PR. cargo-fuzz on every PR would burn
#     GHA minutes for no real signal -- new bugs come from
#     mutated inputs over time, not from a 60-second run on the
#     PR commit.
#   - Toolchain differs: this needs the nightly toolchain for the
#     sanitizer-coverage instrumentation that `cargo fuzz {build,run}`
#     injects (`-Zsanitizer`, etc.). The parent `ci.yml` pins
#     stable. Keeping the two workflows separate means a nightly
#     compiler regression cannot break the PR-blocking jobs.
#   - Status-check semantics differ: this workflow is NOT listed
#     in branch protection's required status checks on `main`. A
#     red nightly fuzz signal is an actionable finding to triage,
#     not a per-commit merge blocker. The required-checks list
#     stays at the six entries from `ci.yml` plus `Detect changed
#     paths`.
#
# Workflow runs the five fuzz targets under `rust/fuzz/`
# (`parse_extensions`, `parse_message`, `validate_response`,
# `parse_authenticator_body`, `parse_server_response`) in a
# per-target matrix so a crash on one target does not short-circuit
# the others. New crash reproducers are uploaded as artefacts so a
# red run is actionable without re-running locally. The
# `matrix-parity` job cross-checks `cargo fuzz list` against the
# `matrix.target` list so a `[[bin]]` in `rust/fuzz/Cargo.toml` that
# is not mirrored here fails red instead of going silently un-fuzzed
# (bd nts-o54o / NTS-68).
#
# Out of scope: surfacing fuzz coverage as a percentage, integrating
# the corpus into Codecov, or feeding crashes back into the
# regression-seed corpus automatically (that step is intentionally
# manual -- a maintainer reviews the crash, fixes the bug, then
# copies the reproducer into `rust/fuzz/corpus/<target>/` as a
# regression seed).

on:
  # Daily at 06:00 UTC. Adjustable; the only constraint is finishing
  # within the GHA per-step 6h timeout, which 60 s/target × 5 targets
  # comfortably clears even with cold-cache build time included.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_total_time:
        description: 'Wall-clock seconds per fuzz target (libFuzzer -max_total_time)'
        required: false
        default: '60'
  # PR trigger is scoped so the workflow only runs on changes that
  # could actually break it: the workflow file itself, or the fuzz
  # workspace. The vast majority of PRs do not touch either path
  # and skip this job entirely. Skipped jobs do not count against
  # branch protection here because this job is not in the required
  # checks list.
  pull_request:
    paths:
      - '.github/workflows/fuzz.yml'
      - 'rust/fuzz/**'

# Workflow-wide GITHUB_TOKEN baseline: `contents: read` is the
# minimum `actions/checkout` needs and implicitly denies every
# other scope. This workflow uploads only artefacts (no Codecov,
# no release uploads), so no further scopes are opted in.
permissions:
  contents: read

# Per-ref concurrency. cancel-in-progress is false here, unlike the
# parent `ci.yml` where it is true on PRs: a force-push to a PR
# branch that touched `rust/fuzz/**` should let the previous fuzz
# run finish so a crash it found is not lost to mid-run cancellation.
# Cron runs use `refs/heads/main` and the group keys the workflow
# name + ref, so cron and PR runs land in different groups and
# never queue against each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Single source of truth for the cargo-fuzz binary version consumed
# by the cache steps (key segment) and install steps (`--version`
# arg) in both jobs below. Bumping this env var propagates the new
# pin to all sites in lockstep; the caches invalidate on the new
# key, the install steps pick up the new version on the resulting
# miss, and no manual multi-site edit is required. See the `fuzz`
# job's `Install cargo-fuzz` step for the comment on why `--locked`
# is deliberately omitted at this pin.
env:
  CARGO_FUZZ_VERSION: '0.13.1'

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      # A crash on one target should surface alongside the green
      # signal from the other legs, not pre-empt them. Each leg is
      # independent: separate cache key, separate artefact bundle,
      # separate runner.
      fail-fast: false
      matrix:
        target:
          - parse_extensions
          - parse_message
          - validate_response
          - parse_authenticator_body
          - parse_server_response
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # cargo-fuzz requires nightly for the sanitizer-coverage
      # instrumentation `cargo fuzz {build,run}` injects into the
      # target binary. `dtolnay/rust-toolchain@nightly` installs
      # the latest nightly snapshot and sets it as the default
      # toolchain on the runner. The explicit `cargo +nightly`
      # invocations below double-pin against any future regression
      # that changes default-toolchain semantics.
      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly

      # cargo-fuzz writes incremental build output to
      # `rust/fuzz/target/`. Including `${{ matrix.target }}` in the
      # key keeps per-leg caches separate so one leg's incremental
      # state does not stomp on another's. `workspaces` points at
      # the standalone `rust/fuzz/` Cargo workspace (intentionally
      # separate from the parent `rust/` workspace -- see
      # `rust/fuzz/Cargo.toml` for the rationale).
      - name: Cache cargo registry + fuzz target dir
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust/fuzz
          key: ${{ matrix.target }}

      # `cargo install cargo-fuzz` is the dominant cold-build cost
      # of this workflow (~2-3 min from source). The version is
      # interpolated from the job-level `CARGO_FUZZ_VERSION` env
      # var (defined at the top of this job) into both the cache
      # key below and the install step's `--version` arg further
      # down, so a deliberate bump propagates to both sites in
      # lockstep. Without the env-var indirection a bump would
      # require updating two literals and silently degrade to a
      # stale cache hit if either was missed; floating to whatever
      # `latest` resolved to on a cold miss would silently change
      # CI behaviour.
      - name: Cache cargo-fuzz binary
        id: cargo-fuzz-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-${{ env.CARGO_FUZZ_VERSION }}

      # Deliberately no `--locked` here: the cargo-fuzz version
      # currently pinned by `CARGO_FUZZ_VERSION` (0.13.1, released
      # Jun 2025) ships a `Cargo.lock` that pins `rustix v0.36.5`,
      # which uses the unstable `rustc_attrs` feature attribute (via
      # `#[cfg_attr(rustc_attrs, rustc_layout_scalar_valid_range_*)]`)
      # without enabling the corresponding nightly feature gate. The
      # current `dtolnay/rust-toolchain@nightly` snapshot has tightened
      # its handling of those attributes and rejects the build with
      # `cannot find attribute rustc_layout_scalar_valid_range_start
      # in this scope`. Letting cargo resolve a fresh `rustix` (and
      # the rest of cargo-fuzz's tooling deps) sidesteps the
      # stale-lockfile failure without affecting the version of
      # cargo-fuzz itself (still pinned via `--version "$CARGO_FUZZ_VERSION"`
      # below). Re-evaluate when bumping `CARGO_FUZZ_VERSION`: a newer
      # release may ship a lockfile that resolves cleanly, in which
      # case `--locked` can be restored.
      # Diverges from the `--locked` pattern used for cargo-tarpaulin
      # in `ci.yml`; cargo-tarpaulin 0.35.2 is much newer and its
      # lockfile still resolves cleanly against current nightlies.
      - name: Install cargo-fuzz
        if: steps.cargo-fuzz-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-fuzz --version "$CARGO_FUZZ_VERSION"

      # `cargo fuzz run <target>` exits non-zero on a crash; libFuzzer
      # writes the reproducer to `rust/fuzz/artifacts/<target>/crash-*`.
      # The `if: failure()` artefact-upload step below captures those
      # files so the job's red signal is actionable rather than just
      # a red dot in the Actions tab.
      #
      # libFuzzer flags:
      #   -max_total_time: wall-clock budget for this run. Default
      #     60 s on cron; overridable via workflow_dispatch input.
      #   -timeout: per-input timeout in seconds. Set lower than the
      #     total budget so a stuck input does not eat the run.
      #   -print_final_stats=1: print exec/s, edges-covered, etc. on
      #     exit so the run logs carry a baseline trend without
      #     needing a separate stats-publishing step.
      - name: Run fuzz target
        working-directory: rust/fuzz
        env:
          MAX_TOTAL_TIME: ${{ github.event.inputs.max_total_time || '60' }}
        run: |
          cargo +nightly fuzz run "${{ matrix.target }}" -- \
            -max_total_time=$MAX_TOTAL_TIME \
            -timeout=25 \
            -print_final_stats=1

      # Uploaded only on failure (`if: failure()`). A green run has
      # nothing in `rust/fuzz/artifacts/<target>/` worth retaining.
      # 30-day retention gives a maintainer time to triage the
      # crash, decide whether it is a real bug or a fuzzer artefact,
      # and copy the reproducer into `rust/fuzz/corpus/<target>/`
      # as a regression seed before the artefact expires.
      - name: Upload crash artefacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crashes-${{ matrix.target }}-${{ github.run_id }}
          path: rust/fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: warn
          retention-days: 30

  # Parity gate for the `fuzz` job's matrix. The requirement that
  # every `[[bin]]` in `rust/fuzz/Cargo.toml` is mirrored in
  # `matrix.target` above was previously comment-enforced only; a
  # drifted entry manifested as a silently un-fuzzed target with no
  # red signal. This job makes the parity mechanical: it compares
  # `cargo fuzz list` (the same enumeration `cargo fuzz run`
  # consumes) against the matrix parsed out of this workflow file,
  # and fails on any difference in either direction. It shares the
  # workflow's triggers, so the PR paths filter covers both drift
  # sources: a new fuzz target under `rust/fuzz/**`, or a matrix
  # edit to this file. Like the fuzz legs, it is intentionally NOT
  # in branch protection's required status checks (bd nts-o54o /
  # NTS-68).
  matrix-parity:
    name: Fuzz matrix parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Explicit stable install (same pinned action as `ci.yml`)
      # rather than relying on whatever toolchain happens to be
      # preinstalled on ubuntu-latest. Stable, not nightly: `cargo
      # fuzz list` only enumerates `[[bin]]` targets from the fuzz
      # manifest — no build, so the sanitizer-instrumentation
      # nightly requirement of the `fuzz` job never applies here.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Same key as the fuzz legs' cache step, so this restores the
      # binary those legs (or a previous run of this job) already
      # built; the install step below only pays the ~2-3 min source
      # build on a cold miss.
      - name: Cache cargo-fuzz binary
        id: cargo-fuzz-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-${{ env.CARGO_FUZZ_VERSION }}

      # No `--locked`, same rationale as the `fuzz` job's install
      # step.
      - name: Install cargo-fuzz
        if: steps.cargo-fuzz-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-fuzz --version "$CARGO_FUZZ_VERSION"

      # Sorted-set comparison, symmetric: an un-mirrored `[[bin]]`
      # (silently un-fuzzed target) and a stale matrix entry (leg
      # that fails at `cargo fuzz run` with "no bin target") both
      # trip it. PyYAML is preinstalled on ubuntu-latest runners.
      # Explicit `shell: bash` (which runs with `-o pipefail`) plus
      # `set -euo pipefail` so a `cargo fuzz list` failure inside
      # the command substitution cannot be masked by `sort`
      # succeeding.
      - name: Compare cargo fuzz list against the workflow matrix
        shell: bash
        run: |
          set -euo pipefail
          actual="$(cd rust/fuzz && cargo fuzz list | sort)"
          expected="$(python3 -c 'import yaml; print("\n".join(sorted(yaml.safe_load(open(".github/workflows/fuzz.yml"))["jobs"]["fuzz"]["strategy"]["matrix"]["target"])))')"
          echo "matrix.target entries:"
          printf '%s\n' "$expected"
          echo "cargo fuzz list targets:"
          printf '%s\n' "$actual"
          if [ "$expected" != "$actual" ]; then
            echo "::error file=.github/workflows/fuzz.yml::fuzz-target/matrix drift: 'cargo fuzz list' and jobs.fuzz.strategy.matrix.target disagree (diff below; < matrix-only, > manifest-only)"
            diff <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 1
          fi
          echo "parity OK: ${expected//$'\n'/, }"
